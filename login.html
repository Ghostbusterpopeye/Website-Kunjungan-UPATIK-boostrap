    <!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal UPA TIK POLIJE - Login</title>
    <link href="tooplate-inner-peace.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="login-page">
        <!-- Reusing background from the hero section -->
        <div class="background-img">
            <img src="polije.jpg" alt="">
        </div>

        <!-- Animated elements from the theme -->
        <div class="peace-bg">
            <div class="breathing-circle"></div>
            <div class="breathing-circle"></div>
            <div class="breathing-circle"></div>
            <div class="breathing-circle"></div>
        </div>

        <div class="login-card">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Home</a>

            <div class="login-header">
                <h2>Portal Login</h2>
                <p>Silakan pilih jenis akun Anda</p>
            </div>

            <div class="role-selector">
                <input type="radio" id="role-user" name="user_type" value="user" checked>
                <label for="role-user"><i class="fas fa-users"></i> Pengguna</label>

                <input type="radio" id="role-admin" name="user_type" value="admin">
                <label for="role-admin"><i class="fas fa-user-shield"></i> Admin</label>
            </div>

            <div class="info-box">
                <i class="fas fa-shield-alt"></i>
                <span id="login-info-text">Masuk sebagai Pengguna Umum</span>
            </div>

            <form id="form-user" class="login-form form-group" action="user-index.php" method="POST">
                <div class="input-with-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Username / Email" name="username" required>
                </div>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" name="password" required>
                </div>
                <button type="submit" class="submit-btn">Masuk ke Portal</button>
            </form>

            <form id="form-admin" class="login-form form-group" action="admin-dashboard.html" method="POST"
                style="display: none;">
                <div class="input-with-icon">
                    <i class="fas fa-user-shield"></i>
                    <input type="text" placeholder="Username Admin" name="username" required>
                </div>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password Admin" name="password" required>
                </div>
                <button type="submit" class="submit-btn" style="background: #e74c3c;">Masuk ke Dashboard Admin</button>
            </form>

            <div class="login-footer" style="margin-top: 1.5rem; text-align: center;">
                <a href="index.html" style="font-size: 0.9rem; color: #666;">Kembali ke Halaman Utama</a>
            </div>
        </div>
    </div>

    <script src="tooplate-inner-peace-scripts.js"></script>
    <script src="script.js"></script>
</body>

</html>
