<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal UPA TIK POLIJE - Login</title>
    <link href="tooplate-inner-peace.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-page">
        <!-- Reusing background from the hero section -->
        <div class="background-img">
            <img src="polije.jpg" alt="">
        </div>
        
        <!-- Animated elements from the theme -->
        <div class="peace-bg">
            <div class="breathing-circle"></div>
            <div class="breathing-circle"></div>
            <div class="breathing-circle"></div>
            <div class="breathing-circle"></div>
        </div>

        <div class="login-card">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Home</a>
            
            <div class="login-header">
                <h2>Selamat Datang</h2>
                <p>Silakan masuk untuk mengakses layanan.</p>
            </div>
            
            <div class="info-box">
                <i class="fas fa-info-circle"></i> <span id="login-info-text">Login dengan menggunakan NIM / NIP dan Password</span>
            </div>

            <div class="login-form form-group">
                <div class="input-with-icon">
                    <i class="fas fa-id-card"></i>
                    <input type="text" placeholder="NIM / NIP" id="login-id">
                </div>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" id="login-pass">
                </div>
                
                <button class="submit-btn" onclick="loginUser()">Masuk Sekarang</button>
                
                <div class="login-footer">
                    <a href="daftar.html">Belum punya akun? Daftar sekarang</a>
                </div>
            </div>
        </div>
    </div>

    <script src="tooplate-inner-peace-scripts.js"></script>
    <script src="script.js"></script>
</body>
</html>
